name: CI/CD Microservices

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Auth Service
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./docker/Dockerfile.services
          target: auth
          push: true
          tags: my-repo/auth-service:latest

      - name: Deploy to K8s
        uses: azure/k8s-deploy@v1
        with:
          manifests: |
            k8s/auth-deployment.yaml
            k8s/user-deployment.yaml
            k8s/ai-deployment.yaml
            k8s/ingress.yaml
          images: |
            my-repo/auth-service:latest
            my-repo/user-service:latest
            my-repo/ai-service:latest
